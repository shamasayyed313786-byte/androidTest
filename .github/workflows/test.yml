name: Build MAUI Android APK Manually

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest

    steps:
    - name: Clone Remote Repository
      run: |
        git clone https://github.com/joshuabscott/MauiApp1HelloWorld.git .

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.x'

    - name: Install MAUI Android Workload
      run: dotnet workload install maui-android --ignore-failed-sources

    # ADDED /p:CheckEolWorkloads=false HERE
    - name: Restore Dependencies
      run: dotnet restore MauiApp1HelloWorld.sln /p:CheckEolWorkloads=false

    # ADDED /p:CheckEolWorkloads=false HERE
    - name: Build Unsigned Android APK
      run: |
        dotnet publish MauiApp1HelloWorld.csproj -c Release -f net8.0-android /p:AndroidPackageFormats=apk /p:AndroidKeyStore=false /p:CheckEolWorkloads=false

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: maui-android-apk
        path: |
          bin/Release/net8.0-android/publish/*.apk
          bin/Release/net8.0-android/*.apk
          
