name: Build MAUI Android APK Manually

on:
  workflow_dispatch: # Trigger manually from the Actions tab

jobs:
  build-android:
    runs-on: windows-latest

    steps:
    # 1. Manually clone the target public repository into the working environment
    - name: Clone Remote Repository
      run: |
        git clone https://github.com/joshuabscott/MauiApp1HelloWorld.git .

    # 2. Setup the Java Development Kit
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'

    # 3. Setup .NET SDK
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.x'

    # 4. Install the .NET MAUI Android Workload
    - name: Install MAUI Android Workload
      run: dotnet workload install maui-android --ignore-failed-sources

    # 5. Restore dependencies
    - name: Restore Dependencies
      run: dotnet restore MauiApp1HelloWorld/MauiApp1HelloWorld.csproj

    # 6. Build and Publish into an Unsigned Release APK
    - name: Build Unsigned Android APK
      run: |
        dotnet publish MauiApp1HelloWorld/MauiApp1HelloWorld.csproj -c Release -f net8.0-android /p:AndroidPackageFormats=apk /p:AndroidKeyStore=false

    # 7. Collect and upload the generated APK
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: maui-android-apk
        path: MauiApp1HelloWorld/bin/Release/net8.0-android/publish/*.apk
        
