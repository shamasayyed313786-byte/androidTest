name: Build Native Termux Executable Binary

on:
  workflow_dispatch:

jobs:
  build-android-bin:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Add Android Target Architecture
      run: rustup target add aarch64-linux-android

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r27b # Matches the NDK 27 version found in your build runner

    - name: Compile Standalone Executable
      run: |
        rustc main.rs \
          --target aarch64-linux-android \
          -C linker=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang \
          -C target-feature=+crt-static \
          -O \
          -o termux-native-bin

    - name: Upload Native Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: termux-executable
        path: termux-native-bin
        
