name: Build llama.cpp for Termux

on:
  workflow_dispatch:
    inputs:
      llama_version:
        description: 'llama.cpp branch or tag to build'
        required: true
        default: 'master'

jobs:
  build-android-termux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Clone llama.cpp
      run: |
        git clone --depth 1 --branch ${{ github.event.inputs.llama_version }} https://github.com/ggml-org/llama.cpp.git llama-cpp-src

    - name: Configure CMake for Android (aarch64)
      run: |
        cd llama-cpp-src
        mkdir build
        # Using the built-in Android NDK path provided by GitHub runners
        cmake -B build \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -DCMAKE_BUILD_TYPE=Release \
          -DLLAMA_BUILD_TESTS=OFF \
          -DBUILD_SHARED_LIBS=OFF

    - name: Build Binaries
      run: |
        cd llama-cpp-src
        cmake --build build --config Release -j $(nproc)

    - name: Prepare Artifacts
      run: |
        mkdir termux-binaries
        # Copy primary CLI executables
        cp llama-cpp-src/build/bin/llama-cli termux-binaries/
        cp llama-cpp-src/build/bin/llama-server termux-binaries/
        cp llama-cpp-src/build/bin/llama-quantize termux-binaries/
        
    - name: Upload Binaries Artifact
      uses: actions/upload-artifact@v4
      with:
        name: llama-cpp-termux-aarch64
        path: termux-binaries/
        
